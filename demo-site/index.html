<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopEasy — Online Store</title>
  <style>
    /* ── Deliberately bad contrast on body text ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f0; color: #bbbbaa; }

    /* ── Nav: cart icon is tiny and unlabelled ── */
    nav {
      background: #2a2a2a;
      display: flex;
      align-items: center;
      padding: 8px 16px;
      gap: 12px;
    }
    nav .logo { color: #fff; font-size: 20px; font-weight: bold; flex: 1; }
    nav .nav-links { display: flex; gap: 16px; }
    nav .nav-links a { color: #aaa; text-decoration: none; font-size: 14px; }
    /* Cart is hidden in a corner with no label and tiny hit target */
    nav .cart-area {
      position: relative;
      width: 18px;
      height: 18px;
      cursor: pointer;
      margin-left: 8px;
    }
    nav .cart-area img { width: 16px; height: 16px; filter: invert(0.4); }
    /* Cart badge is invisible — same color as background */
    nav .cart-badge {
      position: absolute;
      top: -4px; right: -4px;
      background: #2a2a2a;
      color: #2a2a2a;
      font-size: 8px;
      border-radius: 50%;
      width: 12px; height: 12px;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      text-align: center;
      padding: 60px 20px;
    }
    .hero h1 { font-size: 36px; margin-bottom: 12px; }
    .hero p { font-size: 16px; opacity: 0.9; margin-bottom: 24px; }
    /* "Shop Now" button has very low contrast */
    .hero .cta {
      background: #6a6a8a;
      color: #8a8aaa;
      padding: 12px 28px;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }

    /* ── Products ── */
    .products { padding: 40px 20px; max-width: 1100px; margin: 0 auto; }
    .products h2 { margin-bottom: 24px; color: #333; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .product-card {
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .product-card img { width: 100%; height: 180px; object-fit: cover; background: #ddd; }
    .product-card .info { padding: 16px; }
    .product-card .name { font-size: 15px; font-weight: 600; color: #222; margin-bottom: 6px; }
    .product-card .price { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 10px; }
    /* "Add to Cart" button blends into the card — bad affordance */
    .product-card .add-btn {
      background: #e8e8e0;
      color: #c0c0b0;
      border: none;
      padding: 8px 14px;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
    }
    .product-card .add-btn:hover { background: #d5d5c5; }

    /* ── Checkout modal — hard to find, ambiguous labels ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 8px;
      padding: 32px;
      width: 400px;
      max-width: 95vw;
    }
    .modal h2 { margin-bottom: 20px; color: #222; }
    .modal label { font-size: 12px; color: #aaa; display: block; margin-bottom: 4px; }
    .modal input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 8px;
      margin-bottom: 14px;
      font-size: 14px;
    }
    /* Submit button labelled ambiguously */
    .modal .submit-btn {
      background: #667eea;
      color: #fff;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    /* Close button invisible against white background */
    .modal .close-btn {
      position: absolute;
      top: 12px; right: 12px;
      background: none;
      border: none;
      color: #f0f0f0;
      font-size: 20px;
      cursor: pointer;
    }
    .modal-wrapper { position: relative; }

    /* ── Footer ── */
    footer {
      background: #222;
      color: #666;
      text-align: center;
      padding: 20px;
      font-size: 12px;
      margin-top: 60px;
    }

    .lang-switcher { text-align: right; padding: 6px 20px; background: #eee; font-size: 12px; }
    .lang-switcher a { color: #888; text-decoration: none; margin-left: 8px; }
  </style>
</head>
<body>

  <div class="lang-switcher">
    <a href="/index.html">EN</a>
    <a href="/de.html">DE</a>
  </div>

  <nav>
    <div class="logo">ShopEasy</div>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">About</a>
    </div>
    <!-- Cart: tiny icon, no label, badge invisible -->
    <div class="cart-area" onclick="openCheckout()" aria-label="">
      <svg viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" width="16" height="16">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <div class="cart-badge" id="cartBadge">0</div>
    </div>
  </nav>

  <div class="hero">
    <h1>Welcome to ShopEasy</h1>
    <p>Find amazing products at great prices</p>
    <button class="cta">Shop Now</button>
  </div>

  <div class="products">
    <h2>Featured Products</h2>
    <div class="grid">
      <div class="product-card">
        <div style="background:#e0d5f0;height:180px;display:flex;align-items:center;justify-content:center;font-size:40px;">🎧</div>
        <div class="info">
          <div class="name">Wireless Headphones</div>
          <div class="price">$89.99</div>
          <button class="add-btn" onclick="addToCart(this)">Proceed</button>
        </div>
      </div>
      <div class="product-card">
        <div style="background:#d5e8d5;height:180px;display:flex;align-items:center;justify-content:center;font-size:40px;">⌚</div>
        <div class="info">
          <div class="name">Smart Watch</div>
          <div class="price">$129.99</div>
          <button class="add-btn" onclick="addToCart(this)">Proceed</button>
        </div>
      </div>
      <div class="product-card">
        <div style="background:#f0e8d5;height:180px;display:flex;align-items:center;justify-content:center;font-size:40px;">📱</div>
        <div class="info">
          <div class="name">Phone Case</div>
          <div class="price">$19.99</div>
          <button class="add-btn" onclick="addToCart(this)">Proceed</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Checkout modal -->
  <div class="modal-overlay" id="checkoutModal">
    <div class="modal-wrapper">
      <div class="modal">
        <button class="close-btn" onclick="closeCheckout()">×</button>
        <h2>Finalize</h2>
        <label>Field 1</label>
        <input type="text" placeholder="" />
        <label>Field 2</label>
        <input type="text" placeholder="" />
        <label>Field 3</label>
        <input type="text" placeholder="" />
        <button class="submit-btn">Submit</button>
      </div>
    </div>
  </div>

  <footer>
    &copy; 2024 ShopEasy. All rights reserved.
  </footer>

  <script>
    let cartCount = 0;
    function addToCart(btn) {
      cartCount++;
      document.getElementById('cartBadge').textContent = cartCount;
    }
    function openCheckout() {
      document.getElementById('checkoutModal').classList.add('open');
    }
    function closeCheckout() {
      document.getElementById('checkoutModal').classList.remove('open');
    }
  </script>
</body>
</html>
